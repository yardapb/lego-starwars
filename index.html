<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LEGO SW">
<meta name="theme-color" content="#ffe81f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGO Star Wars – Databáze figurek</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1520;
    --surface2: #0f1f30;
    --border: #1a3a5c;
    --accent: #ffe81f;
    --accent2: #4fc3f7;
    --red: #ff3d3d;
    --text: #d0e8ff;
    --text-dim: #5a8ab0;
    --novo: #4fc3f7;
    --pouzite: #ff9800;
    --set-color: #00B0F0;
    --glow: 0 0 20px rgba(255,232,31,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Rajdhani', sans-serif; min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(0,40,80,0.4) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(0,20,60,0.3) 0%, transparent 50%);
  }

  header {
    background: linear-gradient(180deg, #000 0%, var(--surface) 100%);
    border-bottom: 2px solid var(--accent);
    padding: 24px 32px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 40px rgba(255,232,31,0.15);
  }
  .logo { display: flex; align-items: center; gap: 16px; }
  .logo-icon { width: 48px; height: 48px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--glow); }
  .logo-text h1 { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,232,31,0.5); }
  .logo-text p { font-size: 11px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }

  .view-toggle { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px; }
  .view-btn { padding: 6px 14px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 4px; font-size: 16px; transition: all 0.2s; }
  .view-btn.active { background: var(--accent); color: #000; }

  .stats-bar { display: flex; gap: 2px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; overflow-x: auto; }
  .stat-item { padding: 14px 20px; display: flex; flex-direction: column; align-items: center; min-width: 110px; border-right: 1px solid var(--border); transition: background 0.2s; }
  .stat-item:hover { background: var(--surface2); }
  .stat-value { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }

  .controls { display: flex; gap: 12px; padding: 20px 32px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 16px 10px 40px; font-family: 'Rajdhani', sans-serif; font-size: 15px; border-radius: 4px; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,232,31,0.15); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 16px; }
  select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; font-family: 'Rajdhani', sans-serif; font-size: 14px; border-radius: 4px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }
  .btn { padding: 10px 20px; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1px; border-radius: 4px; cursor: pointer; transition: all 0.2s; border: none; text-transform: uppercase; }
  .btn-primary { background: var(--accent); color: #000; box-shadow: 0 0 16px rgba(255,232,31,0.3); }
  .btn-primary:hover { background: #fff; box-shadow: 0 0 24px rgba(255,232,31,0.6); transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-outline:hover { background: rgba(79,195,247,0.1); transform: translateY(-1px); }

  .results-info { padding: 10px 32px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .results-info span { color: var(--accent); }

  /* TABLE */
  .table-wrap { padding: 0 32px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { position: sticky; top: 0; z-index: 10; }
  th { background: var(--surface2); color: var(--text-dim); font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 16px; text-align: left; border-bottom: 2px solid var(--border); cursor: pointer; white-space: nowrap; user-select: none; transition: color 0.2s; }
  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }
  tr { border-bottom: 1px solid rgba(26,58,92,0.5); transition: background 0.15s; animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  tbody tr:hover { background: var(--surface2); cursor: pointer; }
  td { padding: 10px 16px; vertical-align: middle; }

  /* blue row highlight for set rows */
  tbody tr.is-set { border-left: 3px solid var(--set-color); }
  tbody tr.is-set td { background: rgba(0,176,240,0.04); }
  tbody tr.is-set:hover td { background: rgba(0,176,240,0.09); }

  .td-thumb { width: 48px; text-align: center; padding: 6px 12px; }
  .td-thumb img { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); transition: transform 0.2s; }
  tbody tr:hover .td-thumb img { transform: scale(1.3); }
  .td-kod { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .td-nazev { font-weight: 500; max-width: 280px; color: var(--text); }
  .td-datum { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .td-od { font-size: 12px; color: var(--text-dim); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-cena { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; text-align: right; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .badge-nove { background: rgba(79,195,247,0.15); color: var(--novo); border: 1px solid rgba(79,195,247,0.3); }
  .badge-pouzite { background: rgba(255,152,0,0.12); color: var(--pouzite); border: 1px solid rgba(255,152,0,0.3); }
  .badge-set { background: rgba(0,176,240,0.15); color: var(--set-color); border: 1px solid rgba(0,176,240,0.4); font-size: 10px; white-space: nowrap; }
  .badge-standalone { color: var(--text-dim); font-size: 13px; }

  /* GRID */
  .grid-wrap { padding: 24px 32px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px 12px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease both; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--border); transition: background 0.2s; }
  .card.is-set { border-left: 3px solid var(--set-color); }
  .card.is-set::before { background: var(--set-color); }
  .card:hover { border-color: var(--accent2); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .card:hover::before { background: var(--accent); }
  .card-img { width: 86px; height: 86px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); transition: transform 0.2s; }
  .card:hover .card-img { transform: scale(1.08); }
  .card-name { font-size: 12px; font-weight: 600; text-align: center; line-height: 1.4; color: var(--text); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-kod { font-family: 'Orbitron', monospace; font-size: 9px; color: var(--text-dim); margin-bottom: 6px; }
  .card-set { font-size: 9px; color: var(--set-color); margin-bottom: 6px; letter-spacing: 0.5px; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 4px; }
  .card-cena { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--accent); font-weight: 700; }
  .card .badge { font-size: 9px; padding: 2px 7px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(6px); }
  .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--accent); border-radius: 10px; width: 640px; max-width: 95vw; max-height: 92vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.9); animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .modal-hero { display: flex; align-items: center; gap: 24px; padding: 24px 28px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .modal-hero-img { width: 100px; height: 100px; object-fit: contain; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); flex-shrink: 0; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
  .modal-hero-info { flex: 1; min-width: 0; }
  .modal-hero-info h2 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
  .modal-hero-info .sw-code { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--accent2); margin-bottom: 6px; }
  .modal-hero-info .set-info { font-size: 12px; color: var(--set-color); margin-bottom: 8px; }
  .modal-hero-img-link { font-size: 11px; color: var(--text-dim); word-break: break-all; text-decoration: none; border-bottom: 1px dashed var(--border); transition: color 0.2s; }
  .modal-hero-img-link:hover { color: var(--accent2); }
  .modal-body { padding: 24px 28px; }
  .modal-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-section-label { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .modal-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; transition: color 0.2s; }
  .modal-close:hover { color: var(--accent); }
  .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .field-full { grid-column: 1 / -1; }
  .field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; font-family: 'Rajdhani', sans-serif; font-size: 14px; border-radius: 4px; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 10px 20px; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1px; border-radius: 4px; cursor: pointer; margin-right: auto; transition: all 0.2s; text-transform: uppercase; }
  .btn-danger:hover { background: rgba(255,61,61,0.1); }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧱</div>
    <div class="logo-text">
      <h1>LEGO Star Wars</h1>
      <p>Databáze minifigurek</p>
    </div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;">
    <div class="view-toggle">
      <button class="view-btn active" id="btnTable" onclick="setView('table')" title="Tabulka">☰</button>
      <button class="view-btn" id="btnGrid" onclick="setView('grid')" title="Mřížka">⊞</button>
    </div>
    <button class="btn btn-primary" onclick="openModal(null)">+ Přidat</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Celkem</div></div>
  <div class="stat-item"><div class="stat-value" id="stat-nove">0</div><div class="stat-label">Nové</div></div>
  <div class="stat-item"><div class="stat-value" id="stat-pouzite">0</div><div class="stat-label">Použité</div></div>
  <div class="stat-item"><div class="stat-value" id="stat-set">0</div><div class="stat-label">Ze setu</div></div>
  <div class="stat-item"><div class="stat-value" id="stat-hodnota">0</div><div class="stat-label">Hodnota (Kč)</div></div>
  <div class="stat-item"><div class="stat-value" id="stat-avg">0</div><div class="stat-label">Průměr (Kč)</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Hledat název, kód, set..." oninput="filterData()">
  </div>
  <select id="stavFilter" onchange="filterData()">
    <option value="">Vše (stav)</option>
    <option value="nové">Nové</option>
    <option value="použité">Použité</option>
  </select>
  <select id="setFilter" onchange="filterData()">
    <option value="">Vše (původ)</option>
    <option value="set">Ze setu</option>
    <option value="standalone">Samostatné</option>
  </select>
  <select id="setNumFilter" onchange="filterData()">
    <option value="">Vše (set č.)</option>
  </select>
  <button class="btn btn-outline" onclick="exportCSV()">⬇ CSV</button>
</div>

<div class="results-info">
  <div>Zobrazeno: <span id="results-count">0</span> figurek</div>
  <div id="results-value" style="font-size:11px;"></div>
</div>

<div id="viewTable" class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:60px;cursor:default;">Obr.</th>
        <th onclick="sortBy('kod')">Kód <span id="sort-kod">↕</span></th>
        <th onclick="sortBy('nazev')">Název <span id="sort-nazev">↕</span></th>
        <th onclick="sortBy('set')">Součást setu <span id="sort-set">↕</span></th>
        <th onclick="sortBy('datum')">Datum <span id="sort-datum">↕</span></th>
        <th onclick="sortBy('od')">Od <span id="sort-od">↕</span></th>
        <th onclick="sortBy('stav')">Stav <span id="sort-stav">↕</span></th>
        <th onclick="sortBy('cena')" style="text-align:right">Cena <span id="sort-cena">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="viewGrid" class="grid-wrap" style="display:none;">
  <div class="grid" id="gridBody"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-hero" id="modalHero"></div>
    <div class="modal-body">
      <div class="modal-title-row">
        <span class="modal-section-label" id="modalTitle">Figurka</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="field-group">
        <div class="field"><label>Kód LEGO</label><input type="text" id="f-kod"></div>
        <div class="field"><label>Stav</label>
          <select id="f-stav"><option value="nové">Nové</option><option value="použité">Použité</option></select>
        </div>
        <div class="field field-full"><label>Název</label><input type="text" id="f-nazev"></div>
        <div class="field"><label>SW kód (obrázek)</label><input type="text" id="f-swkod" placeholder="např. sw0500" oninput="updateModalPreview()"></div>
        <div class="field"><label>Součást setu</label><input type="text" id="f-set" placeholder="č. setu nebo ponechat prázdné"></div>
        <div class="field"><label>Cena (Kč)</label><input type="number" id="f-cena" min="0"></div>
        <div class="field"><label>Datum nákupu</label><input type="date" id="f-datum"></div>
        <div class="field field-full"><label>Prodejce / Zdroj</label><input type="text" id="f-od"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-danger" id="btnDelete" onclick="deleteRecord()" style="display:none">🗑 Smazat</button>
        <button class="btn btn-outline" onclick="closeModal()">Zrušit</button>
        <button class="btn btn-primary" onclick="saveRecord()">Uložit</button>
      </div>
    </div>
  </div>
</div>

<script>

Signet", "datum": "2026-05-03", "od": "LEGO Chodov, součást setu 75446 (3179,-), hodnota figurky dle dne zakoupení", "stav": "nové", "cena": 220, "sw_kod": "sw1522", "set": "součást setu 75446"}];
const IMG_URL = sw => `https://img.bricklink.com/ItemImage/MN/0/${sw}.png`;

let data = [], filtered = [];
let sortCol = 'datum', sortDir = -1;
let editIndex = null, currentView = 'table';

function initData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  data = saved ? JSON.parse(saved) : SOURCE_DATA.map((r,i) => ({...r, _id:i}));
  if (!saved) saveToStorage();
  buildSetFilter();
}
function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function buildSetFilter() {
  const sel = document.getElementById('setNumFilter');
  const nums = [...new Set(data.filter(r => r.set && r.set !== '-').map(r => r.set.replace('součást setu ','').trim()))].sort((a,b)=>Number(a)-Number(b));
  nums.forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = 'Set ' + n; sel.appendChild(o); });
}

function updateStats() {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-nove').textContent = data.filter(r => r.stav==='nové').length;
  document.getElementById('stat-pouzite').textContent = data.filter(r => r.stav==='použité').length;
  document.getElementById('stat-set').textContent = data.filter(r => r.set && r.set !== '-').length;
  const total = data.reduce((s,r)=>s+(r.cena||0),0);
  document.getElementById('stat-hodnota').textContent = total.toLocaleString('cs-CZ');
  document.getElementById('stat-avg').textContent = data.length ? Math.round(total/data.length).toLocaleString('cs-CZ') : 0;
}

function filterData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const stav = document.getElementById('stavFilter').value;
  const setF = document.getElementById('setFilter').value;
  const setNum = document.getElementById('setNumFilter').value;
  filtered = data.filter(r => {
    const matchQ = !q || (r.nazev||'').toLowerCase().includes(q) || (r.kod||'').toLowerCase().includes(q) || (r.od||'').toLowerCase().includes(q) || (r.sw_kod||'').toLowerCase().includes(q) || (r.set||'').toLowerCase().includes(q);
    const matchStav = !stav || r.stav===stav;
    const isSet = r.set && r.set !== '-';
    const matchSet = !setF || (setF==='set' && isSet) || (setF==='standalone' && !isSet);
    const matchSetNum = !setNum || (r.set||'').includes(setNum);
    return matchQ && matchStav && matchSet && matchSetNum;
  });
  sortFiltered(); renderAll();
}

function sortBy(col) {
  if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  document.querySelectorAll('th').forEach(t => t.classList.remove('sorted'));
  const el = document.getElementById('sort-'+col);
  if (el) { el.closest('th').classList.add('sorted'); el.textContent = sortDir===1?'↑':'↓'; }
  filterData();
}
function sortFiltered() {
  filtered.sort((a,b) => {
    let va=a[sortCol]??'', vb=b[sortCol]??'';
    if (sortCol==='cena') { va=Number(va); vb=Number(vb); } else { va=String(va).toLowerCase(); vb=String(vb).toLowerCase(); }
    return va<vb?-sortDir:va>vb?sortDir:0;
  });
}

function renderAll() {
  const cnt = filtered.length;
  document.getElementById('results-count').textContent = cnt;
  const filtVal = filtered.reduce((s,r)=>s+(r.cena||0),0);
  document.getElementById('results-value').textContent = cnt!==data.length ? 'Hodnota filtru: '+filtVal.toLocaleString('cs-CZ')+' Kč' : '';
  updateStats();
  if (currentView==='table') renderTable(); else renderGrid();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) { tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><div class="icon">🔭</div><p>Žádné výsledky</p></div></td></tr>'; return; }
  tbody.innerHTML = filtered.map((r,i) => {
    const isSet = r.set && r.set !== '-';
    const setCls = isSet ? 'is-set' : '';
    const setBadge = isSet ? `<span class="badge badge-set">🔵 ${esc(r.set)}</span>` : `<span class="badge-standalone">—</span>`;
    return `<tr class="${setCls}" onclick="openModal(${data.indexOf(r)})" style="animation-delay:${Math.min(i*0.015,0.4)}s" data-idx="${i}">
      <td class="td-thumb" data-sw="${r.sw_kod||''}"></td>
      <td class="td-kod">${esc(r.kod||'—')}</td>
      <td class="td-nazev">${esc(r.nazev||'—')}</td>
      <td>${setBadge}</td>
      <td class="td-datum">${r.datum||'—'}</td>
      <td class="td-od" title="${esc(r.od||'')}">${esc(r.od||'—')}</td>
      <td><span class="badge ${r.stav==='nové'?'badge-nove':'badge-pouzite'}">${r.stav||'—'}</span></td>
      <td class="td-cena">${r.cena?r.cena.toLocaleString('cs-CZ')+' Kč':'—'}</td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr').forEach((tr, i) => {
    const r = filtered[i]; if (!r) return;
    const td = tr.querySelector('.td-thumb');
    if (r.sw_kod) {
      const img = document.createElement('img');
      img.src = IMG_URL(r.sw_kod); img.loading = 'lazy';
      img.style.cssText = 'width:40px;height:40px;object-fit:contain;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);transition:transform 0.2s;';
      img.onerror = function() { this.style.display='none'; };
      td.innerHTML=''; td.appendChild(img);
      tr.addEventListener('mouseover', () => img.style.transform='scale(1.3)');
      tr.addEventListener('mouseout', () => img.style.transform='');
    } else { td.innerHTML='<div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;">🤖</div>'; }
  });
}

function renderGrid() {
  const grid = document.getElementById('gridBody');
  if (!filtered.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔭</div><p>Žádné výsledky</p></div>'; return; }
  grid.innerHTML = filtered.map((r,i) => {
    const isSet = r.set && r.set !== '-';
    return `<div class="card${isSet?' is-set':''}" onclick="openModal(${data.indexOf(r)})" style="animation-delay:${Math.min(i*0.02,0.6)}s">
      <div style="width:86px;height:86px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;" class="card-img-wrap"></div>
      <div class="card-kod">${esc(r.sw_kod||r.kod||'')}</div>
      <div class="card-name">${esc(r.nazev||'—')}</div>
      ${isSet ? `<div class="card-set">🔵 ${esc(r.set)}</div>` : ''}
      <div class="card-bottom">
        <span class="card-cena">${r.cena?r.cena.toLocaleString('cs-CZ')+' Kč':'—'}</span>
        <span class="badge ${r.stav==='nové'?'badge-nove':'badge-pouzite'}">${r.stav||''}</span>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach((card, i) => {
    const r = filtered[i]; if (!r) return;
    const wrap = card.querySelector('.card-img-wrap');
    if (r.sw_kod) {
      const img = document.createElement('img'); img.className='card-img';
      img.src = IMG_URL(r.sw_kod); img.loading='lazy'; img.alt=r.nazev||'';
      img.onerror = function() { this.outerHTML='<div style="font-size:38px;">🤖</div>'; };
      wrap.appendChild(img);
    } else { wrap.innerHTML='<div style="font-size:38px;">🤖</div>'; }
  });
}

function setView(v) {
  currentView = v;
  document.getElementById('viewTable').style.display = v==='table'?'block':'none';
  document.getElementById('viewGrid').style.display = v==='grid'?'block':'none';
  document.getElementById('btnTable').classList.toggle('active', v==='table');
  document.getElementById('btnGrid').classList.toggle('active', v==='grid');
  renderAll();
}

function updateModalPreview() {
  const sw = document.getElementById('f-swkod').value.trim().toLowerCase();
  const img = document.getElementById('modalHeroImg');
  if (img && sw) { img.src = IMG_URL(sw); }
}

function openModal(idx) {
  editIndex = idx;
  const overlay = document.getElementById('modalOverlay');
  const hero = document.getElementById('modalHero');
  if (idx === null) {
    document.getElementById('modalTitle').textContent = 'Nová figurka';
    ['f-kod','f-nazev','f-od','f-swkod','f-set'].forEach(id => document.getElementById(id).value='');
    document.getElementById('f-datum').value='';
    document.getElementById('f-stav').value='nové';
    document.getElementById('f-cena').value='';
    document.getElementById('btnDelete').style.display='none';
    hero.innerHTML=`<div style="width:100px;height:100px;display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0;">🧱</div><div><div style="font-family:Orbitron,monospace;font-size:15px;color:var(--accent);">Nová figurka</div><div style="font-size:12px;color:var(--text-dim);margin-top:6px;">Vyplňte formulář níže</div></div>`;
  } else {
    const r = data[idx];
    document.getElementById('modalTitle').textContent = 'Upravit figurku';
    document.getElementById('f-kod').value = r.kod||'';
    document.getElementById('f-nazev').value = r.nazev||'';
    document.getElementById('f-datum').value = r.datum||'';
    document.getElementById('f-od').value = r.od||'';
    document.getElementById('f-stav').value = r.stav||'nové';
    document.getElementById('f-cena').value = r.cena||'';
    document.getElementById('f-swkod').value = r.sw_kod||'';
    // extract just the number for the set field
    const setVal = (r.set && r.set!=='-') ? r.set.replace('součást setu ','').trim() : '';
    document.getElementById('f-set').value = setVal;
    document.getElementById('btnDelete').style.display='inline-block';
    const imgUrl = r.sw_kod ? IMG_URL(r.sw_kod) : '';
    const isSet = r.set && r.set !== '-';
    hero.innerHTML=`
      ${imgUrl ? `<img id="modalHeroImg" src="${imgUrl}" class="modal-hero-img" onerror="this.style.display='none'" alt="">` : `<div style="width:100px;height:100px;display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0;">🤖</div>`}
      <div class="modal-hero-info">
        <h2>${esc(r.nazev||'—')}</h2>
        <div class="sw-code">${r.sw_kod||r.kod||''}</div>
        ${isSet ? `<div class="set-info">🔵 ${esc(r.set)}</div>` : ''}
        ${imgUrl ? `<a class="modal-hero-img-link" href="${imgUrl}" target="_blank">🔗 BrickLink obrázek</a>` : ''}
      </div>`;
  }
  overlay.classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); editIndex=null; }
function closeModalOutside(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

function saveRecord() {
  let swKod = document.getElementById('f-swkod').value.trim().toLowerCase();
  if (!swKod) { const m=(document.getElementById('f-nazev').value||'').match(/\((sw[\w]+)/i); if(m) swKod=m[1].toLowerCase(); }
  const setRaw = document.getElementById('f-set').value.trim();
  const rec = {
    kod: document.getElementById('f-kod').value.trim(),
    nazev: document.getElementById('f-nazev').value.trim(),
    datum: document.getElementById('f-datum').value,
    od: document.getElementById('f-od').value.trim(),
    stav: document.getElementById('f-stav').value,
    cena: parseInt(document.getElementById('f-cena').value)||0,
    sw_kod: swKod,
    set: setRaw ? 'součást setu ' + setRaw : '-',
  };
  if (!rec.nazev) { alert('Vyplňte název.'); return; }
  if (editIndex===null) { rec._id=Date.now(); data.unshift(rec); }
  else { data[editIndex]={...data[editIndex],...rec}; }
  saveToStorage(); closeModal(); filterData();
}

function deleteRecord() {
  if (editIndex===null) return;
  if (!confirm('Opravdu smazat?')) return;
  data.splice(editIndex,1); saveToStorage(); closeModal(); filterData();
}

function exportCSV() {
  const rows=[['Kód','Název','SW kód','Součást setu','Datum nákupu','Od','Stav','Cena','Odkaz na obrázek']];
  filtered.forEach(r => rows.push([r.kod,r.nazev,r.sw_kod,r.set,r.datum,r.od,r.stav,r.cena,r.sw_kod?IMG_URL(r.sw_kod):'']));
  const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv); a.download='lego_starwars.csv'; a.click();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

initData(); updateStats(); filterData(); sortBy('datum');
</script>

<div id="installBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(90deg,#0a1520,#0f1f30);border-top:2px solid #ffe81f;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:2000;box-shadow:0 -4px 20px rgba(255,232,31,0.2);">
  <div style="display:flex;align-items:center;gap:12px;">
    <img src="icon-192.png" style="width:36px;height:36px;border-radius:6px;">
    <div>
      <div style="font-family:Orbitron,monospace;font-size:12px;color:#ffe81f;font-weight:700;">Nainstalovat aplikaci</div>
      <div style="font-size:11px;color:#5a8ab0;margin-top:2px;">Přidat LEGO SW na plochu</div>
    </div>

</div>

<script>
// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/lego-starwars/sw.js')
      .then(r => console.log('SW registered'))
      .catch(e => console.log('SW error', e));
  });
}

// PWA Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});
</script>
